version: v2
plugins:
  # Connect-ES v2: protoc-gen-es emits both message types and the service
  # descriptor used by createClient(). No separate connect plugin needed.
  - local: protoc-gen-es
    out: src/gen
    opt:
      - target=ts
      - import_extension=js
  # Connect-Query: per-RPC query descriptors consumed by useQuery/useMutation.
  - local: protoc-gen-connect-query
    out: src/gen
    opt:
      - target=ts
      - import_extension=js

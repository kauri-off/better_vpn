name: release

# Cut a release either by pushing a tag like `v0.1.0`, or by running this
# workflow from `master` (Actions -> release -> Run workflow). A dispatch run
# derives the version from the latest git tag (bumping its last component), or
# from the `version` input if given, and creates the tag itself.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.4). Blank = bump the latest tag."
        required: false
        default: ""

permissions:
  contents: write # needed to create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need the full tag history to derive the next version

      # ---------------------------------------------------------------- backend
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build backend (vpn-backend + vpnctl)
        run: cargo build --release --target "$TARGET" --bin vpn-backend --bin vpnctl

      # --------------------------------------------------------------- web panel
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build web panel
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm generate        # buf generate -> src/gen (gitignored)
          pnpm build           # tsc + vite -> web/dist

      # ----------------------------------------------------------------- package
      - name: Package artifacts
        run: |
          BIN_DIR="target/${TARGET}/release"

          # Version-less asset names so `releases/latest/download/<name>` resolves.
          tar -C "${BIN_DIR}" -czf "better-vpn-backend-${TARGET}.tar.gz" vpn-backend vpnctl

          # Web panel: archive the built dist (contents at the tar root).
          tar -C web/dist -czf "better-vpn-webpanel.tar.gz" .

          sha256sum better-vpn-*.tar.gz > SHA256SUMS.txt

      # Tag push -> use the pushed tag. Dispatch -> use the `version` input if
      # given, else bump the last component of the latest `v*` tag (v1.3 -> 1.4).
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            ver="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            ver="${{ github.event.inputs.version }}"
            ver="${ver#v}"
          else
            latest=$(git tag --list 'v*' --sort=-v:refname | head -1)
            latest="${latest#v}"
            if [ -z "$latest" ]; then
              ver="0.1"
            else
              ver="${latest%.*}.$(( ${latest##*.} + 1 ))"
            fi
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $ver"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            better-vpn-backend-x86_64-unknown-linux-gnu.tar.gz
            better-vpn-webpanel.tar.gz
            SHA256SUMS.txt
